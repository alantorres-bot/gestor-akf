# Modelo dos segredos do app multiusuário.
#
# LOCAL: copie para .streamlit/secrets.toml (já ignorado pelo git) e preencha.
# DEPLOY (Streamlit Community Cloud): cole este conteúdo em
#   App → Settings → Secrets (não vai para o GitHub).
#
# Sem estes segredos o app roda em "modo local" (admin único, sem banco).

# --- Banco (Supabase) ---
SUPABASE_URL = "https://SEU-PROJETO.supabase.co"
# Use a SERVICE ROLE KEY (Dashboard → Project Settings → API). Ela é server-side;
# NUNCA aparece no navegador. Não confundir com a anon key.
SUPABASE_SERVICE_KEY = "COLE_A_SERVICE_ROLE_KEY_AQUI"

# --- Primeiro administrador ---
# Este e-mail é sempre admin (mesmo antes de existir na tabela usuarios),
# para você conseguir entrar e cadastrar os demais.
BOOTSTRAP_ADMIN_EMAIL = "voce@neoformas.com.br"

# --- API do Consistem (carteira ao vivo) ---
CONSISTEM_API_KEY = "COLE_O_TOKEN_DO_CSMEN050_AQUI"
# Opcionais (já têm padrão): CONSISTEM_BASE_URL, CONSISTEM_EMPRESA

# --- Login com Google (OIDC) — st.login ---
# Crie um "OAuth Client ID" (tipo Web) no Google Cloud Console e cole abaixo.
# O redirect_uri deve ser a URL do app + /oauth2callback.
[auth]
redirect_uri = "https://gestor-akf-neoformas.streamlit.app/oauth2callback"
cookie_secret = "TROQUE_POR_UMA_STRING_ALEATORIA_LONGA"
client_id = "COLE_O_CLIENT_ID_DO_GOOGLE"
client_secret = "COLE_O_CLIENT_SECRET_DO_GOOGLE"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# --- Apenas para testar o login fora do OIDC (opcional) ---
# DEV_EMAIL = "voce@neoformas.com.br"
